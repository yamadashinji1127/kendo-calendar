<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カレンダー</title>
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    :root {
      --green: #4CAF50; --green-light: #e8f5e9;
      --red: #e53935;   --blue: #1e88e5;
      --border: #ebebeb; --bg: #f7f8fa;
      --text: #1a1a1a;  --sub: #999;
      --white: #fff;    --radius: 14px;
    }

    /* ===== FULL-SCREEN BASE ===== */
    html {
      height: 100%;
      /* dvh: dynamic viewport height (handles iPhone address bar) */
      height: -webkit-fill-available;
    }
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;               /* modern iOS/Android */
      height: -webkit-fill-available; /* Safari fallback */
      width: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
      background: var(--white);
      color: var(--text);
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
    }

    /* ===== HEADER ===== */
    .app-header {
      flex-shrink: 0;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 10px;
      /* respect iPhone status bar */
      padding-top: env(safe-area-inset-top, 0px);
      z-index: 50;
    }
    .header-top {
      display: flex; align-items: center;
      justify-content: space-between;
      height: 44px;   /* compact – was 48px */
    }
    .app-logo {
      font-size: 17px; font-weight: 800; color: var(--green); letter-spacing: -0.5px;
    }
    .header-controls { display: flex; align-items: center; gap: 1px; }
    .nav-btn {
      background: none; border: none; width: 32px; height: 32px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--sub); font-size: 22px; transition: background 0.12s;
      touch-action: manipulation;
    }
    .nav-btn:hover  { background: #f0f0f0; }
    .nav-btn:active { background: var(--border); }
    .today-btn {
      background: none; border: 1.5px solid var(--green); color: var(--green);
      padding: 3px 10px; border-radius: 18px; font-size: 11px; font-weight: 700;
      cursor: pointer; white-space: nowrap; touch-action: manipulation;
      transition: background 0.12s; margin-left: 2px;
    }
    .today-btn:hover  { background: var(--green-light); }
    .today-btn:active { opacity: 0.75; }
    .month-title {
      font-size: 16px; font-weight: 700; color: var(--text);
      min-width: 96px; text-align: center;
    }

    /* ===== CALENDAR — fills all remaining height ===== */
    .calendar-wrap {
      flex: 1;            /* take all space below header */
      min-height: 0;      /* allow shrinking inside flex */
      display: flex;
      flex-direction: column;
      background: var(--white);
      overflow: hidden;
      /* respect iPhone home indicator */
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* weekday label row — fixed height */
    .weekdays {
      flex-shrink: 0;
      display: grid; grid-template-columns: repeat(7,1fr);
      border-bottom: 1px solid var(--border);
      background: #fafafa;
    }
    .weekday {
      text-align: center; padding: 5px 0 4px;
      font-size: 10px; font-weight: 700; color: var(--sub); letter-spacing: 0.2px;
    }
    .weekday.wd-sun { color: var(--red); }
    .weekday.wd-sat { color: var(--blue); }

    /* days viewport — clips the 3-panel sliding track */
    .days-viewport {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      position: relative;
    }
    .swipe-track {
      display: flex;
      width: 300%;
      height: 100%;
      will-change: transform;
    }
    /* each panel — 1/3 of track = 100% of viewport */
    .days-grid {
      width: 33.333%;
      min-width: 0;
      flex-shrink: 0;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      /* grid-template-rows is set dynamically in JS */
    }

    /* each day cell — height controlled by grid, not min-height */
    .day-cell {
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 2px 2px 1px;
      cursor: pointer; transition: background 0.1s;
      overflow: hidden; position: relative;
      display: flex; flex-direction: column;
      touch-action: manipulation;
    }
    .day-cell:nth-child(7n)          { border-right: none; }
    /* last row: remove bottom border so it sits flush */
    .day-cell.last-row               { border-bottom: none; }
    .day-cell:hover                  { background: #f9fafb; }
    .day-cell:active                 { background: #ebebeb; }
    .day-cell.other-month            { background: #fafafa; }

    /* date number */
    .day-num {
      width: 22px; height: 22px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; font-size: 11px; font-weight: 500;
      margin-bottom: 1px;
    }
    .day-cell.other-month  .day-num  { color: #ccc; }
    .day-cell.is-sunday    .day-num  { color: var(--red); }
    .day-cell.is-saturday  .day-num  { color: var(--blue); }
    .day-cell.is-holiday   .day-num  { color: var(--red); }
    .day-cell.is-today     .day-num  { background: var(--green); color: #fff !important; font-weight: 700; }

    .holiday-name {
      flex-shrink: 0;
      font-size: 8px; color: var(--red); line-height: 1.1;
      padding: 0 1px; margin-bottom: 1px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* event chip — title only */
    .event-chip {
      display: block; font-size: 10px; line-height: 1.45;
      padding: 1px 4px; border-radius: 3px; margin-bottom: 1px;
      color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-weight: 500; cursor: pointer; flex-shrink: 0;
      transition: opacity 0.1s; touch-action: manipulation;
    }
    .event-chip:hover  { opacity: 0.82; }
    .more-badge {
      font-size: 9px; color: var(--sub); padding-left: 3px;
      font-weight: 500; flex-shrink: 0;
    }

    /* ===== OVERLAY ===== */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 200;
      align-items: flex-end; justify-content: center;
      backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
    }
    .overlay.open { display: flex; }
    @media (min-width: 560px) {
      .overlay { align-items: center; }
      .sheet   { border-radius: var(--radius) !important; max-width: 480px; margin: 0 auto; }
    }

    /* ===== BOTTOM SHEET ===== */
    .sheet {
      background: var(--white); width: 100%;
      border-radius: 18px 18px 0 0;
      padding: 0 0 env(safe-area-inset-bottom, 12px);
      animation: slideUp 0.26s cubic-bezier(0.34, 1.1, 0.64, 1);
      max-height: 92vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
    @keyframes slideUp {
      from { transform: translateY(110%); opacity: 0; }
      to   { transform: translateY(0);   opacity: 1; }
    }
    .sheet-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 10px auto 0; }
    .sheet-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 18px 10px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--white); z-index: 1;
    }
    .sheet-title    { font-size: 16px; font-weight: 700; }
    .sheet-subtitle { font-size: 11px; color: var(--sub); margin-top: 2px; }
    .sheet-close {
      background: #f0f0f0; border: none; width: 28px; height: 28px;
      border-radius: 50%; font-size: 17px; color: var(--sub); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s; flex-shrink: 0; touch-action: manipulation;
    }
    .sheet-close:hover { background: #e0e0e0; }
    .sheet-body { padding: 14px 18px; }

    /* ===== DAY SHEET ===== */
    .day-date-label    { font-size: 15px; font-weight: 600; }
    .day-holiday-label { font-size: 12px; color: var(--red); font-weight: 500; }
    .event-list-item {
      display: flex; align-items: center; padding: 11px 12px;
      border-radius: 11px; margin-bottom: 7px; background: #f7f8fa;
      cursor: pointer; gap: 10px; transition: background 0.1s; touch-action: manipulation;
    }
    .event-list-item:hover  { background: #f0f2f5; }
    .event-list-item:active { background: #e8eaed; }
    .event-color-bar  { width: 4px; border-radius: 2px; flex-shrink: 0; align-self: stretch; min-height: 36px; }
    .event-list-info  { flex: 1; min-width: 0; }
    .event-list-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .event-list-meta  { font-size: 11px; color: var(--sub); margin-top: 2px; }
    .event-attach-badge { font-size: 10px; color: var(--sub); display: flex; align-items: center; gap: 3px; margin-top: 2px; }
    .event-detail-btn {
      background: none; border: none; color: var(--green);
      font-size: 12px; font-weight: 600; cursor: pointer;
      padding: 4px 7px; border-radius: 7px; flex-shrink: 0; touch-action: manipulation;
    }
    .event-detail-btn:hover { background: var(--green-light); }
    .add-event-btn {
      display: flex; align-items: center; justify-content: center; gap: 5px;
      width: 100%; padding: 12px; border: 1.5px dashed #d0d0d0; border-radius: 11px;
      background: none; color: var(--green); font-size: 14px; font-weight: 600;
      cursor: pointer; margin-top: 4px; transition: all 0.12s; touch-action: manipulation;
    }
    .add-event-btn:hover { border-color: var(--green); background: var(--green-light); }
    .empty-label { text-align: center; color: var(--sub); font-size: 13px; padding: 16px 0 8px; }

    /* ===== DETAIL SHEET ===== */
    .detail-header-row { display: flex; align-items: flex-start; gap: 11px; margin-bottom: 14px; }
    .detail-color-bar  { width: 5px; border-radius: 3px; flex-shrink: 0; align-self: stretch; min-height: 38px; }
    .detail-title { font-size: 20px; font-weight: 700; line-height: 1.3; flex: 1; }
    .detail-meta-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; color: var(--sub); font-size: 13px; }
    .detail-note  { font-size: 13px; color: var(--sub); margin-bottom: 14px; white-space: pre-wrap; word-break: break-all; }
    .detail-section-label {
      font-size: 10px; font-weight: 700; color: var(--sub); letter-spacing: 0.5px;
      text-transform: uppercase; margin-bottom: 8px; padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .img-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 5px; margin-bottom: 14px; }
    .img-thumb { aspect-ratio: 1; border-radius: 8px; object-fit: cover; width: 100%; cursor: pointer; transition: opacity 0.12s; background: #eee; }
    .img-thumb:hover { opacity: 0.85; }
    .file-item {
      display: flex; align-items: center; gap: 9px; padding: 10px 12px;
      border-radius: 9px; background: #f7f8fa; margin-bottom: 7px;
      cursor: pointer; transition: background 0.12s; touch-action: manipulation;
    }
    .file-item:hover { background: #eef0f3; }
    .file-icon { font-size: 22px; flex-shrink: 0; }
    .file-name { flex: 1; font-size: 13px; word-break: break-all; }
    .file-size { font-size: 11px; color: var(--sub); flex-shrink: 0; }
    .detail-btn-row { display: flex; gap: 9px; margin-top: 10px; }
    .detail-btn {
      flex: 1; padding: 13px; border-radius: 11px; font-size: 14px;
      font-weight: 700; cursor: pointer; font-family: inherit;
      transition: opacity 0.12s; touch-action: manipulation; border: none;
    }
    .detail-btn:active  { opacity: 0.8; }
    .detail-btn-edit    { background: var(--green); color: #fff; }
    .detail-btn-copy    { background: #f0f0f0; color: var(--text); }

    /* ===== COPY PICKER SHEET ===== */
    .copy-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .copy-month-label { font-size: 16px; font-weight: 700; }
    .copy-weekdays { display: grid; grid-template-columns: repeat(7,1fr); text-align: center; margin-bottom: 4px; }
    .copy-weekdays span { font-size: 10px; font-weight: 700; color: var(--sub); padding: 4px 0; }
    .copy-weekdays .cw-sun { color: var(--red); }
    .copy-weekdays .cw-sat { color: var(--blue); }
    .copy-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; margin-bottom: 14px; }
    .copy-day {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      border-radius: 50%; font-size: 12px; cursor: pointer; transition: all 0.12s; touch-action: manipulation;
    }
    .copy-day.other-month  { color: #ccc; }
    .copy-day.is-csunday   { color: var(--red); }
    .copy-day.is-csaturday { color: var(--blue); }
    .copy-day.is-ctoday    { font-weight: 700; border: 1.5px solid var(--green); }
    .copy-day.selected     { background: var(--green); color: #fff !important; font-weight: 700; }
    .copy-day:not(.other-month):hover { background: var(--green-light); }
    .copy-selected-info { text-align: center; font-size: 12px; color: var(--sub); margin-bottom: 10px; min-height: 18px; }

    /* ===== FORM ===== */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block; font-size: 11px; font-weight: 700; color: var(--sub);
      letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 7px;
    }
    .form-input {
      width: 100%; padding: 12px 13px; border: 1.5px solid var(--border);
      border-radius: 11px; font-size: 16px; color: var(--text); background: var(--white);
      outline: none; transition: border-color 0.2s; font-family: inherit; -webkit-appearance: none;
    }
    .form-input:focus { border-color: var(--green); }
    .form-input::placeholder { color: #c0c0c0; }
    .color-grid { display: flex; gap: 9px; flex-wrap: wrap; }
    .color-swatch {
      width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
      border: 3px solid transparent; transition: transform 0.12s, border-color 0.12s;
      position: relative; touch-action: manipulation;
    }
    .color-swatch.active { border-color: #222; transform: scale(1.15); }
    .color-swatch.active::after { content: ''; position: absolute; inset: 3px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.8); }
    .attach-row { display: flex; gap: 9px; }
    .attach-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 3px; padding: 13px 8px;
      border: 1.5px dashed #d0d0d0; border-radius: 11px; background: none;
      color: var(--sub); font-size: 11px; font-weight: 600; cursor: pointer;
      transition: all 0.12s; font-family: inherit; touch-action: manipulation;
    }
    .attach-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-light); }
    .attach-btn-icon { font-size: 22px; }
    .pending-images { display: grid; grid-template-columns: repeat(3,1fr); gap: 5px; margin-top: 9px; }
    .pending-img-wrap { position: relative; aspect-ratio: 1; }
    .pending-img { width: 100%; height: 100%; object-fit: cover; border-radius: 7px; display: block; background: #eee; }
    .pending-remove {
      position: absolute; top: 2px; right: 2px; width: 20px; height: 20px;
      border-radius: 50%; background: rgba(0,0,0,0.55); color: #fff;
      border: none; font-size: 13px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .pending-files { margin-top: 7px; display: flex; flex-direction: column; gap: 5px; }
    .pending-file { display: flex; align-items: center; gap: 7px; padding: 8px 11px; background: #f7f8fa; border-radius: 8px; font-size: 12px; }
    .pending-file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pending-file-remove { background: none; border: none; color: var(--red); font-size: 17px; cursor: pointer; padding: 0 3px; line-height: 1; flex-shrink: 0; }
    .btn-row { display: flex; flex-direction: column; gap: 9px; margin-top: 4px; }
    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 11px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: opacity 0.12s, transform 0.1s; font-family: inherit; touch-action: manipulation;
    }
    .btn:active  { opacity: 0.8; transform: scale(0.98); }
    .btn-save    { background: var(--green); color: #fff; }
    .btn-delete  { background: #fff; color: var(--red); border: 1.5px solid #ffcdd2; }
    .btn-delete:hover { background: #fff5f5; }
    .btn:disabled { opacity: 0.5; }

    /* ===== LIGHTBOX ===== */
    #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 500; align-items: center; justify-content: center; }
    #lightbox.open { display: flex; }
    #lightboxImg { max-width: 96vw; max-height: 90vh; border-radius: 8px; object-fit: contain; }
    #lightboxClose {
      position: absolute; top: 16px; right: 16px;
      background: rgba(255,255,255,0.15); border: none; color: #fff;
      width: 36px; height: 36px; border-radius: 50%; font-size: 22px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    /* ===== SPINNER ===== */
    .spinner-wrap { display: flex; align-items: center; justify-content: center; padding: 24px; color: var(--sub); font-size: 13px; gap: 8px; }
    .spinner { width: 18px; height: 18px; border: 2px solid #ddd; border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== TOAST ===== */
    .toast {
      position: fixed; bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
      left: 50%; transform: translateX(-50%) translateY(16px);
      background: rgba(30,30,30,0.82); color: #fff; padding: 9px 20px;
      border-radius: 20px; font-size: 13px; font-weight: 500;
      z-index: 1000; opacity: 0; transition: all 0.25s; white-space: nowrap; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ===== DESKTOP OVERRIDE ===== */
    @media (min-width: 600px) {
      body { background: var(--bg); }
      .app-header { padding: 0 16px; padding-top: 0; }
      .calendar-wrap {
        margin: 12px 12px 12px;
        border-radius: var(--radius);
        box-shadow: 0 2px 12px rgba(0,0,0,0.07);
        /* on desktop let it shrink naturally within remaining flex space */
      }
      .event-chip { font-size: 11px; }
      .day-num { width: 24px; height: 24px; font-size: 12px; }
    }
    @media (min-width: 900px) {
      .calendar-wrap { margin: 16px 20px; }
      .img-grid { grid-template-columns: repeat(4,1fr); }
    }
  </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="app-header">
  <div class="header-top">
    <div class="app-logo">Calendar</div>
    <div class="header-controls">
      <button class="nav-btn" id="prevBtn">&#8249;</button>
      <div class="month-title" id="monthTitle"></div>
      <button class="nav-btn" id="nextBtn">&#8250;</button>
      <button class="today-btn" id="todayBtn">今日</button>
    </div>
  </div>
</header>

<!-- ===== CALENDAR ===== -->
<div class="calendar-wrap">
  <div class="weekdays">
    <div class="weekday wd-sun">日</div>
    <div class="weekday">月</div>
    <div class="weekday">火</div>
    <div class="weekday">水</div>
    <div class="weekday">木</div>
    <div class="weekday">金</div>
    <div class="weekday wd-sat">土</div>
  </div>
  <div class="days-viewport" id="daysViewport">
    <div class="swipe-track" id="swipeTrack">
      <div class="days-grid" id="daysGrid0"></div>
      <div class="days-grid" id="daysGrid1"></div>
      <div class="days-grid" id="daysGrid2"></div>
    </div>
  </div>
</div>

<!-- ===== DAY SHEET ===== -->
<div class="overlay" id="dayOverlay">
  <div class="sheet" id="daySheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div>
        <div class="day-date-label" id="dayDateLabel"></div>
        <div class="day-holiday-label" id="dayHolidayLabel"></div>
      </div>
      <button class="sheet-close" id="daySheetClose">&#215;</button>
    </div>
    <div class="sheet-body">
      <div id="dayEventList"></div>
      <button class="add-event-btn" id="addEventBtn">
        <span style="font-size:17px;line-height:1">+</span> 予定を追加
      </button>
    </div>
  </div>
</div>

<!-- ===== DETAIL SHEET ===== -->
<div class="overlay" id="detailOverlay">
  <div class="sheet" id="detailSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title" id="detailSheetDate"></div>
      <button class="sheet-close" id="detailSheetClose">&#215;</button>
    </div>
    <div class="sheet-body" id="detailBody"></div>
  </div>
</div>

<!-- ===== COPY PICKER SHEET ===== -->
<div class="overlay" id="copyOverlay">
  <div class="sheet" id="copySheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div>
        <div class="sheet-title">コピー先を選択</div>
        <div class="sheet-subtitle">複数の日付を選択できます</div>
      </div>
      <button class="sheet-close" id="copySheetClose">&#215;</button>
    </div>
    <div class="sheet-body">
      <div class="copy-nav">
        <button class="nav-btn" id="copyPrevBtn">&#8249;</button>
        <span class="copy-month-label" id="copyMonthLabel"></span>
        <button class="nav-btn" id="copyNextBtn">&#8250;</button>
      </div>
      <div class="copy-weekdays">
        <span class="cw-sun">日</span><span>月</span><span>火</span>
        <span>水</span><span>木</span><span>金</span><span class="cw-sat">土</span>
      </div>
      <div class="copy-grid" id="copyGrid"></div>
      <div class="copy-selected-info" id="copySelectedInfo">日付をタップして選択してください</div>
      <button class="btn btn-save" id="copyConfirmBtn" disabled>コピーする</button>
    </div>
  </div>
</div>

<!-- ===== EVENT FORM SHEET ===== -->

// =====================================================================
// INDEXEDDB
// =====================================================================
const DB_NAME = 'CalendarDB', DB_VERSION = 1;
let db = null;

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('events'))
        d.createObjectStore('events', { keyPath: 'id' });
      if (!d.objectStoreNames.contains('attachments')) {
        const s = d.createObjectStore('attachments', { keyPath: 'id' });
        s.createIndex('eventId', 'eventId', { unique: false });
      }
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror   = e => rej(e.target.error);
  });
}
function idbGetAll(store, idx, key) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const s  = tx.objectStore(store);
    const r  = idx ? s.index(idx).getAll(key) : s.getAll();
    r.onsuccess = () => res(r.result);
    r.onerror   = () => rej(r.error);
  });
}
function idbGet(store, key) {
  return new Promise((res, rej) => {
    const r = db.transaction(store,'readonly').objectStore(store).get(key);
    r.onsuccess = () => res(r.result);
    r.onerror   = () => rej(r.error);
  });
}
function idbPut(store, obj) {
  return new Promise((res, rej) => {
    const r = db.transaction(store,'readwrite').objectStore(store).put(obj);
    r.onsuccess = () => res(r.result);
    r.onerror   = () => rej(r.error);
  });
}
function idbDelete(store, key) {
  return new Promise((res, rej) => {
    const r = db.transaction(store,'readwrite').objectStore(store).delete(key);
    r.onsuccess = () => res();
    r.onerror   = () => rej(r.error);
  });
}

// STATE
// =====================================================================
let currentDate  = new Date();
let selectedDate = null;
let editingId    = null;

// =====================================================================
// UTILS
// =====================================================================
function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function isToday(d) {
  const t = new Date();
  return d.getFullYear()===t.getFullYear() && d.getMonth()===t.getMonth() && d.getDate()===t.getDate();
}
function getHoliday(d) { return HOLIDAYS[dateKey(d)] || null; }
function formatDayLabel(d) { return `${d.getMonth()+1}月${d.getDate()}日（${DOW_JP[d.getDay()]}）`; }
function formatBytes(n) {
  if (n<1024) return n+' B';
  if (n<1048576) return (n/1024).toFixed(1)+' KB';
  return (n/1048576).toFixed(1)+' MB';
}
function uid() { return `${Date.now()}-${Math.random().toString(36).slice(2)}`; }
function fileIcon(mime='', name='') {
  if (mime.startsWith('image/'))  return '🖼️';
  if (mime.includes('pdf'))        return '📄';
  if (mime.includes('word')||/\.docx?$/.test(name)) return '📝';
  if (mime.includes('excel')||/\.xlsx?$/.test(name)) return '📊';
  if (mime.includes('zip')||mime.includes('compress')) return '🗜️';
  if (mime.startsWith('video/'))  return '🎬';
  if (mime.startsWith('audio/'))  return '🎵';
  return '📎';
}
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 2500);
}

// =====================================================================
// LOAD EVENTS
// =====================================================================
async function loadEventsMap() {
  const all = await idbGetAll('events');
  eventsMap = {};
  all.forEach(ev => {
    if (!eventsMap[ev.dateKey]) eventsMap[ev.dateKey] = [];
    eventsMap[ev.dateKey].push(ev);
  });
  Object.values(eventsMap).forEach(arr => {
    arr.sort((a,b) => {
      if (!a.time&&!b.time) return 0;
      if (!a.time) return 1; if (!b.time) return -1;
      return a.time.localeCompare(b.time);
    });
  });
}

// =====================================================================
// RENDER CALENDAR
// =====================================================================
function renderMonth(date, gridEl) {
  const year  = date.getFullYear();
  const month = date.getMonth();
  gridEl.innerHTML = '';

  const firstDow = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month+1, 0).getDate();
  const prevLast = new Date(year, month, 0).getDate();

  const rowCount   = Math.ceil((firstDow + lastDate) / 7);
  const totalCells = rowCount * 7;

  gridEl.style.gridTemplateRows = `repeat(${rowCount}, 1fr)`;

  for (let i = 0; i < totalCells; i++) {
    let d, isCurrent = true;
    if (i < firstDow) {
      d = new Date(year, month-1, prevLast - firstDow + i + 1); isCurrent = false;
    } else if (i - firstDow < lastDate) {
      d = new Date(year, month, i - firstDow + 1);
    } else {
      d = new Date(year, month+1, i - firstDow - lastDate + 1); isCurrent = false;
    }

    const cell = document.createElement('div');
    cell.className = 'day-cell';
    if (!isCurrent) cell.classList.add('other-month');
    if (isToday(d))  cell.classList.add('is-today');
    if (i >= totalCells - 7) cell.classList.add('last-row');

    const dow = d.getDay(), holiday = getHoliday(d);
    if (dow===0||holiday) cell.classList.add('is-sunday','is-holiday');
    else if (dow===6) cell.classList.add('is-saturday');

    const numEl = document.createElement('div');
    numEl.className = 'day-num'; numEl.textContent = d.getDate();
    cell.appendChild(numEl);

    if (holiday && isCurrent) {
      const hEl = document.createElement('div');
      hEl.className = 'holiday-name'; hEl.textContent = holiday;
      cell.appendChild(hEl);
    }

    const key    = dateKey(d);
    const dayEvs = eventsMap[key] || [];
    dayEvs.slice(0, 5).forEach(ev => {
      const chip = document.createElement('div');
      chip.className = 'event-chip';
      chip.style.background = ev.color || COLORS[0];
      chip.textContent = ev.title;
      chip.addEventListener('click', e => { e.stopPropagation(); openDaySheet(d); });
      cell.appendChild(chip);
    });
    if (dayEvs.length > 5) {
      const more = document.createElement('div');
      more.className = 'more-badge';
      more.textContent = `+${dayEvs.length - 5}件`;
      cell.appendChild(more);
    }

    cell.addEventListener('click', () => openDaySheet(d));
    gridEl.appendChild(cell);
  }
}

function renderCalendar() {
  const year  = currentDate.getFullYear();
  const month = currentDate.getMonth();
  document.getElementById('monthTitle').textContent = `${year}年${month+1}月`;

  renderMonth(new Date(year, month-1, 1), document.getElementById('daysGrid0'));
  renderMonth(currentDate,                document.getElementById('daysGrid1'));
  renderMonth(new Date(year, month+1, 1), document.getElementById('daysGrid2'));

  // Reset track to center panel instantly (no animation)
  const track = document.getElementById('swipeTrack');
  const vw    = document.getElementById('daysViewport').offsetWidth;
  track.style.transition = 'none';
  track.style.transform  = `translateX(-${vw}px)`;
}

function openDaySheet(d) {
  selectedDate = d;
  const key = dateKey(d), dayEvs = eventsMap[key]||[], holiday = getHoliday(d);

  document.getElementById('dayDateLabel').textContent = formatDayLabel(d);
  const hl = document.getElementById('dayHolidayLabel');
  hl.textContent = holiday||''; hl.style.display = holiday ? 'block' : 'none';

  const list = document.getElementById('dayEventList');
  list.innerHTML = '';
  if (!dayEvs.length) {
    const e = document.createElement('div');
    e.className = 'empty-label'; e.textContent = '予定はありません';
    list.appendChild(e);
  }
  dayEvs.forEach(ev => {
    const item = document.createElement('div'); item.className = 'event-list-item';
    const bar  = document.createElement('div'); bar.className = 'event-color-bar'; bar.style.background = ev.color||COLORS[0];
    const info = document.createElement('div'); info.className = 'event-list-info';
    const te   = document.createElement('div'); te.className = 'event-list-title'; te.textContent = ev.title;
    const me   = document.createElement('div'); me.className = 'event-list-meta';
    const mp = []; if (ev.time) mp.push(ev.time); if (ev.note) mp.push(ev.note);
    me.textContent = mp.join('　'); me.style.display = mp.length ? 'block' : 'none';
    info.appendChild(te); info.appendChild(me);
    if (ev.imageCount>0||ev.fileCount>0) {
      const b = document.createElement('div'); b.className = 'event-attach-badge';
      if (ev.imageCount>0) b.innerHTML += `🖼️ ${ev.imageCount}`;
      if (ev.fileCount>0)  b.innerHTML += `${ev.imageCount>0?' ':''}📎 ${ev.fileCount}`;
      info.appendChild(b);
    }
    const btn = document.createElement('button'); btn.className = 'event-detail-btn'; btn.textContent = '詳細';
    btn.addEventListener('click', e => { e.stopPropagation(); openDetailSheet(ev); });
    item.appendChild(bar); item.appendChild(info); item.appendChild(btn);
    item.addEventListener('click', () => openDetailSheet(ev));
    list.appendChild(item);
  });
  document.getElementById('dayOverlay').classList.add('open');
}
function closeDaySheet() { document.getElementById('dayOverlay').classList.remove('open'); }

// =====================================================================
// DETAIL SHEET
// =====================================================================
async function openDetailSheet(ev) {
  closeDaySheet();
  const body = document.getElementById('detailBody');
  body.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div>読み込み中…</div>';
  document.getElementById('detailSheetDate').textContent = formatDayLabel(selectedDate);
  document.getElementById('detailOverlay').classList.add('open');

  detailBlobUrls.forEach(u=>URL.revokeObjectURL(u));
  detailBlobUrls = [];
  const atts  = await idbGetAll('attachments','eventId',ev.id);
  const imgs  = atts.filter(a=>a.kind==='image');
  const files = atts.filter(a=>a.kind==='file');
  body.innerHTML = '';

  const hRow = document.createElement('div'); hRow.className = 'detail-header-row';
  const cBar = document.createElement('div'); cBar.className = 'detail-color-bar'; cBar.style.background = ev.color||COLORS[0];
  const tEl  = document.createElement('div'); tEl.className = 'detail-title'; tEl.textContent = ev.title;
  hRow.appendChild(cBar); hRow.appendChild(tEl); body.appendChild(hRow);

  if (ev.time) {
    const r = document.createElement('div'); r.className = 'detail-meta-row';
    r.innerHTML = `<span>🕐</span>${ev.time}`; body.appendChild(r);
  }
  if (ev.note) {
    const n = document.createElement('div'); n.className = 'detail-note'; n.textContent = ev.note;
    body.appendChild(n);
  }

  if (imgs.length) {
    const lbl = document.createElement('div'); lbl.className = 'detail-section-label';
    lbl.textContent = `画像 (${imgs.length})`; body.appendChild(lbl);
    const grid = document.createElement('div'); grid.className = 'img-grid';
    imgs.forEach(att => {
      const url = URL.createObjectURL(new Blob([att.data],{type:att.mime}));
      detailBlobUrls.push(url);
      const img = document.createElement('img');
      img.className='img-thumb'; img.src=url; img.alt=att.name;
      img.addEventListener('click', ()=>openLightbox(url));
      grid.appendChild(img);
    });
    body.appendChild(grid);
  }

  if (files.length) {
    const lbl = document.createElement('div'); lbl.className = 'detail-section-label';
    lbl.textContent = `ファイル (${files.length})`; body.appendChild(lbl);
    files.forEach(att => {
      const item = document.createElement('div'); item.className = 'file-item';
      item.innerHTML = `<span class="file-icon">${fileIcon(att.mime,att.name)}</span><span class="file-name">${att.name}</span><span class="file-size">${formatBytes(att.size)}</span>`;
      item.addEventListener('click', ()=>{
        const url = URL.createObjectURL(new Blob([att.data],{type:att.mime}));
        const a = document.createElement('a'); a.href=url; a.download=att.name; a.click();
        setTimeout(()=>URL.revokeObjectURL(url), 3000);
      });
      body.appendChild(item);
    });
  }

  const btnRow = document.createElement('div'); btnRow.className = 'detail-btn-row';
  const copyBtn = document.createElement('button'); copyBtn.className = 'detail-btn detail-btn-copy'; copyBtn.textContent = '📋 コピー';
  copyBtn.addEventListener('click', ()=>openCopySheet(ev.id));
  const editBtn = document.createElement('button'); editBtn.className = 'detail-btn detail-btn-edit'; editBtn.textContent = '✏️ 編集';
  editBtn.addEventListener('click', ()=>{ closeDetailSheet(); openEventSheet(selectedDate, ev.id); });
  btnRow.appendChild(copyBtn); btnRow.appendChild(editBtn);
  body.appendChild(btnRow);
}
function closeDetailSheet() {
  detailBlobUrls.forEach(u=>URL.revokeObjectURL(u));
  detailBlobUrls = [];
  document.getElementById('detailOverlay').classList.remove('open');
}

// =====================================================================
// COPY PICKER
// =====================================================================
function openCopySheet(evId) {
  copyingEventId   = evId;
  copyViewDate     = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
  copySelectedKeys = new Set();
  closeDetailSheet();
  renderCopyGrid(); updateCopyBtn();
  document.getElementById('copyOverlay').classList.add('open');
}
function closeCopySheet() { document.getElementById('copyOverlay').classList.remove('open'); }

function renderCopyGrid() {
  const year  = copyViewDate.getFullYear();
  const month = copyViewDate.getMonth();
  document.getElementById('copyMonthLabel').textContent = `${year}年${month+1}月`;
  const grid    = document.getElementById('copyGrid'); grid.innerHTML = '';
  const firstDow = new Date(year,month,1).getDay();
  const lastDate = new Date(year,month+1,0).getDate();
  const prevLast = new Date(year,month,0).getDate();
  for (let i = 0; i < 42; i++) {
    let d, isCurrent = true;
    if (i < firstDow) { d = new Date(year,month-1,prevLast-firstDow+i+1); isCurrent=false; }
    else if (i-firstDow < lastDate) { d = new Date(year,month,i-firstDow+1); }
    else { d = new Date(year,month+1,i-firstDow-lastDate+1); isCurrent=false; }
    const key = dateKey(d);
    const cell = document.createElement('div'); cell.className = 'copy-day';
    if (!isCurrent) cell.classList.add('other-month');
    const sel = copySelectedKeys.has(key);
    if (sel) { cell.classList.add('selected'); }
    else {
      const dow = d.getDay(), hol = getHoliday(d);
      if (dow===0||hol) cell.classList.add('is-csunday');
      else if (dow===6) cell.classList.add('is-csaturday');
    }
    if (isToday(d) && !sel) cell.classList.add('is-ctoday');
    cell.textContent = d.getDate();
    cell.addEventListener('click', ()=>{
      if (copySelectedKeys.has(key)) copySelectedKeys.delete(key);
      else copySelectedKeys.add(key);
      renderCopyGrid(); updateCopyBtn();
    });
    grid.appendChild(cell);
  }
}
function updateCopyBtn() {
  const n = copySelectedKeys.size;
  const btn = document.getElementById('copyConfirmBtn');
  const inf = document.getElementById('copySelectedInfo');
  btn.disabled    = n === 0;
  btn.textContent = n > 0 ? `${n}日にコピーする` : 'コピーする';
  inf.textContent = n > 0 ? `${n}日付を選択中` : '日付をタップして選択してください';
}
async function executeCopy() {
  if (!copySelectedKeys.size) return;
  const btn = document.getElementById('copyConfirmBtn');
  btn.disabled = true; btn.textContent = 'コピー中…';
  try {
    const srcEv  = await idbGet('events', copyingEventId);
    if (!srcEv) throw new Error('コピー元が見つかりません');
    const srcAtts = await idbGetAll('attachments','eventId',copyingEventId);
    for (const key of copySelectedKeys) {
      const newEvId = uid();
      await idbPut('events', { ...srcEv, id: newEvId, dateKey: key });
      for (const att of srcAtts) {
        await idbPut('attachments', { ...att, id: uid(), eventId: newEvId });
      }
    }
    await loadEventsMap(); renderCalendar();
    closeCopySheet();
    showToast(`${copySelectedKeys.size}日にコピーしました`);
  } catch(err) {
    console.error(err); alert('コピーに失敗しました: '+err.message);
    btn.disabled = false; btn.textContent = `${copySelectedKeys.size}日にコピーする`;
  }
}

  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').classList.add('open');
}

  document.getElementById('lightbox').classList.remove('open');

// =====================================================================
// EVENT FORM
// =====================================================================
async function openEventSheet(d, evId=null) {
  selectedDate = d; editingId = evId;
  pendingAdd=[]; pendingRemove=[]; existingAttachments=[];
  if (evId) {
    const ev = (eventsMap[dateKey(d)]||[]).find(e=>e.id===evId);
    if (ev) {
      document.getElementById('fTitle').value = ev.title;
      document.getElementById('fTime').value  = ev.time||'';
      document.getElementById('fNote').value  = ev.note||'';
      selectedColor = ev.color||COLORS[0];
      document.getElementById('eventSheetTitle').textContent = '予定を編集';
      document.getElementById('deleteBtn').style.display = 'block';
    }
    existingAttachments = await idbGetAll('attachments','eventId',evId);
  } else {
    document.getElementById('fTitle').value = '';
    document.getElementById('fTime').value  = '';
    document.getElementById('fNote').value  = '';
    selectedColor = COLORS[0];
    document.getElementById('eventSheetTitle').textContent = `${formatDayLabel(d)}に追加`;
    document.getElementById('deleteBtn').style.display = 'none';
  }
  renderColorGrid(); renderPendingAttachments();
  document.getElementById('eventOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('fTitle').focus(), 320);
}
function closeEventSheet() {
  pendingAdd.forEach(p=>{ if(p.previewUrl) URL.revokeObjectURL(p.previewUrl); });
  pendingAdd=[]; pendingRemove=[]; existingAttachments=[];
  document.getElementById('eventOverlay').classList.remove('open');
  editingId = null;
}
function renderColorGrid() {
  const grid = document.getElementById('colorGrid'); grid.innerHTML='';
  COLORS.forEach(c=>{
    const sw = document.createElement('div');
    sw.className = 'color-swatch'+(c===selectedColor?' active':'');
    sw.style.background = c;
    sw.addEventListener('click',()=>{ selectedColor=c; renderColorGrid(); });
    grid.appendChild(sw);
  });
}
function renderPendingAttachments() {
  const iw = document.getElementById('pendingImages'), fw = document.getElementById('pendingFiles');
  iw.innerHTML=''; fw.innerHTML='';
  existingAttachments.forEach(att=>{
    if (pendingRemove.includes(att.id)) return;
    if (att.kind==='image') {
      const url = URL.createObjectURL(new Blob([att.data],{type:att.mime}));
      const wrap = document.createElement('div'); wrap.className='pending-img-wrap';
      const img  = document.createElement('img'); img.className='pending-img'; img.src=url;
      const rm   = document.createElement('button'); rm.className='pending-remove'; rm.textContent='×';
      rm.addEventListener('click',()=>{ pendingRemove.push(att.id); URL.revokeObjectURL(url); renderPendingAttachments(); });
      wrap.appendChild(img); wrap.appendChild(rm); iw.appendChild(wrap);
    } else {
      const row = document.createElement('div'); row.className='pending-file';
      row.innerHTML=`<span>${fileIcon(att.mime,att.name)}</span><span class="pending-file-name">${att.name}</span><span style="font-size:10px;color:var(--sub)">${formatBytes(att.size)}</span>`;
      const rm = document.createElement('button'); rm.className='pending-file-remove'; rm.textContent='×';
      rm.addEventListener('click',()=>{ pendingRemove.push(att.id); renderPendingAttachments(); });
      row.appendChild(rm); fw.appendChild(row);
    }
  });
  pendingAdd.forEach(p=>{
    if (p.kind==='image') {
      const wrap = document.createElement('div'); wrap.className='pending-img-wrap';
      const img  = document.createElement('img'); img.className='pending-img'; img.src=p.previewUrl;
      const rm   = document.createElement('button'); rm.className='pending-remove'; rm.textContent='×';
      rm.addEventListener('click',()=>{ URL.revokeObjectURL(p.previewUrl); pendingAdd=pendingAdd.filter(x=>x.tempId!==p.tempId); renderPendingAttachments(); });
      wrap.appendChild(img); wrap.appendChild(rm); iw.appendChild(wrap);
    } else {
      const row = document.createElement('div'); row.className='pending-file';
      row.innerHTML=`<span>${fileIcon(p.file.type,p.file.name)}</span><span class="pending-file-name">${p.file.name}</span><span style="font-size:10px;color:var(--sub)">${formatBytes(p.file.size)}</span>`;
      const rm = document.createElement('button'); rm.className='pending-file-remove'; rm.textContent='×';
      rm.addEventListener('click',()=>{ pendingAdd=pendingAdd.filter(x=>x.tempId!==p.tempId); renderPendingAttachments(); });
      row.appendChild(rm); fw.appendChild(row);
    }
  });
}
document.getElementById('addImageBtn').addEventListener('click',()=>document.getElementById('imageInput').click());
document.getElementById('addFileBtn').addEventListener('click',()=>document.getElementById('fileInput').click());
document.getElementById('imageInput').addEventListener('change',e=>{
  Array.from(e.target.files).forEach(f=>{
    pendingAdd.push({ tempId:uid(), file:f, kind:'image', previewUrl:URL.createObjectURL(f) });
  }); e.target.value=''; renderPendingAttachments();
});
document.getElementById('fileInput').addEventListener('change',e=>{
  Array.from(e.target.files).forEach(f=>{
    pendingAdd.push({ tempId:uid(), file:f, kind:'file' });
  }); e.target.value=''; renderPendingAttachments();
});

// =====================================================================
// SAVE / DELETE
// =====================================================================
async function saveEvent() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) {
    const inp = document.getElementById('fTitle');
    inp.focus(); inp.style.borderColor='#e53935';
    setTimeout(()=>inp.style.borderColor='',1500); return;
  }
  const btn = document.getElementById('saveBtn');
  btn.disabled=true; btn.textContent='保存中…';
  try {
    const key   = dateKey(selectedDate), evId = editingId || uid();
    const exi   = existingAttachments.filter(a=>a.kind==='image'&&!pendingRemove.includes(a.id));
    const exf   = existingAttachments.filter(a=>a.kind==='file' &&!pendingRemove.includes(a.id));
    const imgCnt = exi.length + pendingAdd.filter(p=>p.kind==='image').length;
    const filCnt = exf.length + pendingAdd.filter(p=>p.kind==='file').length;
    await idbPut('events',{ id:evId, dateKey:key, title,
      time: document.getElementById('fTime').value,
      note: document.getElementById('fNote').value.trim(),
      color: selectedColor, imageCount: imgCnt, fileCount: filCnt });
    for (const aid of pendingRemove) await idbDelete('attachments',aid);
    for (const p of pendingAdd) {
      await idbPut('attachments',{ id:uid(), eventId:evId, kind:p.kind,
        name:p.file.name, mime:p.file.type, size:p.file.size,
        data: await p.file.arrayBuffer() });
    }
    await loadEventsMap(); renderCalendar(); closeEventSheet();
  } catch(err) {
    console.error(err); alert('保存に失敗しました: '+err.message);
    btn.disabled=false; btn.textContent='保存する';
  }
}
async function deleteEvent() {
  if (!editingId||!confirm('この予定を削除しますか？')) return;
  try {
    const atts = await idbGetAll('attachments','eventId',editingId);
    for (const a of atts) await idbDelete('attachments',a.id);
    await idbDelete('events',editingId);
    await loadEventsMap(); renderCalendar(); closeEventSheet();
  } catch(err) { console.error(err); alert('削除に失敗しました: '+err.message); }
}

// 3-panel smooth swipe for month navigation
(function(){
  const viewport = document.getElementById('daysViewport');
  const track    = document.getElementById('swipeTrack');

  let startX=0, startY=0, startT=0;
  let dirLocked=false, isH=false, swiping=false, committed=false;
  let vw=0;

  function setTrackX(x, animate) {
    track.style.transition = animate
      ? 'transform 0.32s cubic-bezier(0.25,0.46,0.45,0.94)'
      : 'none';
    track.style.transform = `translateX(${x}px)`;
  }

  function commitSwipe(dir) {
    committed = true;
    // dir > 0 = right swipe = go to prev month (panel 0)
    // dir < 0 = left  swipe = go to next month (panel 2)
    const target = dir > 0 ? 0 : -2 * vw;
    setTrackX(target, true);
    track.addEventListener('transitionend', function handler() {
      track.removeEventListener('transitionend', handler);
      currentDate = new Date(
        currentDate.getFullYear(),
        currentDate.getMonth() + (dir > 0 ? -1 : 1),
        1
      );
      // eat the upcoming click so the day cell under the finger doesn't fire
      viewport.addEventListener('click', eatClick, { capture: true, once: true });
      renderCalendar(); // resets track to center instantly
    });
  }

  function snapBack() { setTrackX(-vw, true); }

  function eatClick(e) { e.stopPropagation(); e.preventDefault(); }

  viewport.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    vw        = viewport.offsetWidth;
    startX    = e.touches[0].clientX;
    startY    = e.touches[0].clientY;
    startT    = Date.now();
    dirLocked = false; isH = false; swiping = false; committed = false;
    setTrackX(-vw, false); // ensure center, no anim
  }, { passive: true });

  viewport.addEventListener('touchmove', e => {
    if (!e.touches[0]) return;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;

    if (!dirLocked) {
      if (Math.abs(dx) < 8 && Math.abs(dy) < 8) return;
      dirLocked = true;
      isH = Math.abs(dx) > Math.abs(dy);
    }

    if (!isH) return; // vertical — let browser scroll
    e.preventDefault();
    swiping = true;
    setTrackX(-vw + dx, false);
  }, { passive: false });

  viewport.addEventListener('touchend', e => {
    if (!swiping) return;
    const dx  = e.changedTouches[0].clientX - startX;
    const dt  = Date.now() - startT;
    const vel = Math.abs(dx) / dt; // px/ms
    const isFlick = vel > 0.4 && dt < 350;
    if ((Math.abs(dx) > vw * 0.3 || isFlick) && Math.abs(dx) > 20) {
      commitSwipe(dx > 0 ? 1 : -1);
    } else {
      snapBack();
    }
  }, { passive: true });

  viewport.addEventListener('touchcancel', () => {
    if (swiping) snapBack();
  }, { passive: true });
})();

// swipe down to close sheets
(function(){
  const defs = [
    {id:'daySheet',    fn:()=>closeDaySheet()},
    {id:'detailSheet', fn:()=>{ closeDetailSheet(); openDaySheet(selectedDate); }},
    {id:'copySheet',   fn:()=>{ closeCopySheet(); openDaySheet(selectedDate); }},
    {id:'eventSheet',  fn:()=>{ closeEventSheet(); if(selectedDate) openDaySheet(selectedDate); }},
  ];
  defs.forEach(({id,fn})=>{
    let sy=0;
    const el=document.getElementById(id);
    el.addEventListener('touchstart',e=>{ sy=e.touches[0].clientY; },{passive:true});
    el.addEventListener('touchend',e=>{ if(e.changedTouches[0].clientY-sy>80) fn(); },{passive:true});
  });
})();
